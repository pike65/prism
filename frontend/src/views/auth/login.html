<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism - Log In</title>
    
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="../../styles/auth.css">
    <link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="fullscreen-body">

    <div class="auth-wrapper">
        <a href="../../index.html" class="btn-back">← Home Page</a>
        
        <main class="auth-card">
            <h1 class="auth-headline">
                Welcome <span class="gradient-underline">back</span>.
            </h1>
            
            <form class="auth-form" action="#" method="POST">
                <div class="input-group">
                    <!-- <label for="email">Email address</label> -->
                    <input type="email" id="email" name="email" placeholder="Email address" required autocomplete="email">
                </div>

                <div class="input-group">
                    <div class="label-wrapper">
                        <!-- <label for="password">Password</label> -->
                        <a href="#" class="forgot-link">Forgot?</a>
                    </div>
                    <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-submit">Log In</button>
            </form>

            <p class="switch-auth">
                Don't have an account? <a href="signup.html" class="auth-link signup_link">Sign up</a>
            </p>

            <div class="auth-brand-footer">
                <span class="brand-text-logo">prism.</span>
            </div>
        </main>
    </div>
    
</body>
</html>
