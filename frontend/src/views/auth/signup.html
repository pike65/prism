<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism - Sign Up</title>

    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="../../styles/auth.css">
    <link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="fullscreen-body">

    <div class="auth-wrapper">
        <a href="../../index.html" class="btn-back">← Home Page</a>

        <main class="auth-card">
            <h1 class="auth-headline">
                Create your <span class="gradient-underline">account</span>
            </h1>

            <form class="auth-form" action="#" method="POST">
                <div class="input-group">
                    <!-- <label for="username">Username</label> -->
                    <input type="text" id="username" name="username" placeholder="Username" required autocomplete="username">
                </div>

                <div class="input-group">
                    <!-- <label for="email">Email address</label> -->
                    <input type="email" id="email" name="email" placeholder="Email address" required autocomplete="email">
                </div>

                <div class="input-group">
                    <!-- <label for="password">Password</label> -->
                    <input type="password" id="password" name="password" placeholder="Password" required autocomplete="new-password">
                </div>

                <button type="submit" class="btn-submit">Sign Up</button>
            </form>

            <p class="switch-auth">
                Already have an account? <a href="login.html" class="auth-link login_link">Log in</a>
            </p>

            <div class="auth-brand-footer">
                <span class="brand-text-logo">prism.</span>
            </div>
        </main>
    </div>

</body>
</html>
