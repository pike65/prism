<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism - 404</title>
    
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="../../styles/error.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
        <defs>
            <linearGradient id='prism-grad' x1='0%' y1='0%' x2='100%' y2='100%'>
                <stop offset='0%' style='stop-color:%23f472b6;stop-opacity:1' />
                <stop offset='50%' style='stop-color:%233b82f6;stop-opacity:1' />
                <stop offset='100%' style='stop-color:%23a3e635;stop-opacity:1' />
            </linearGradient>
        </defs>
        <polygon points='50 15, 15 80, 85 80' fill='url(%23prism-grad)' />
    </svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="error-container">
        <main class="error-content">
            <div class="broken-prism" aria-hidden="true">
                <span class="prism-fragment frag-left">▲</span>
                <span class="prism-fragment frag-right">▲</span>
            </div>

            <h1 class="error-code">404</h1>
            
            <h2 class="error-headline">Not Found.</h2>
            
            <p class="error-subtext">
                The page you are looking for has shifted out of visible spectrum or never existed.
            </p>

            <a href="../../index.html" class="btn-error-home">Main Page</a>
        </main>
    </div>

</body>
</html>
