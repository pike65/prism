<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism - Dashboard</title>

    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/dashboard.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
        <defs>
            <linearGradient id='prism-grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'>
                <stop offset='0%25' style='stop-color:%23f472b6;stop-opacity:1' />
                <stop offset='50%25' style='stop-color:%233b82f6;stop-opacity:1' />
                <stop offset='100%25' style='stop-color:%23a3e635;stop-opacity:1' />
            </linearGradient>
        </defs>
        <polygon points='50 15, 15 80, 85 80' fill='url(%23prism-grad)' />
    </svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>

<body class="dashboard-body">

    <div class="dash-workspace theme-dark" id="dashboardWorkspace">

        <div class="app-container">
            <header class="app-header">
                <div class="brand-logo">
                    <a href="#">
                        <span class="logo-icon">▲</span>
                    </a>
                </div>
                <nav class="nav-actions">
                    <button class="theme-icon-btn" id="themeToggleBtn" title="Toggle Theme">
                        <div class="icon-engine">
                            <i class="fa-solid fa-moon moon-icon"></i>
                            <i class="fa-solid fa-sun sun-icon"></i>
                        </div>
                    </button>
                    <a href="#" class="btn-signup">Sign-Up</a>
                </nav>
            </header>

            <main class="dash-main">
                <div class="table-control">
                    <div class="control-group search-block">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" class="search-input" placeholder="Search tracked media...">
                    </div>

                    <div class="control-group burger-block">
                        <select class="burger-select" aria-label="Filter Type">
                            <option value="" selected disabled>Type: All</option>
                            <option value="movie">Movies</option>
                            <option value="series">TV Shows</option>
                            <option value="anime">Anime</option>
                            <option value="manga">Manga</option>
                        </select>
                        <i class="fa-solid fa-chevron-down burger-arrow"></i>
                    </div>

                    <div class="control-group burger-block">
                        <select class="burger-select" aria-label="Sort Index">
                            <option value="" selected disabled>Sort By: Recent</option>
                            <option value="title">Title (A-Z)</option>
                            <option value="rating">Rating</option>
                            <option value="edited">Modified</option>
                        </select>
                        <i class="fa-solid fa-chevron-down burger-arrow"></i>
                    </div>

                    <div class="add-block">
                        <button class="add-media-btn">Add Media</button>
                    </div>
                </div>

                <div class="table-scroll-wrapper">
                    <table class="matrix-table">
                        <thead>
                            <tr>
                                <th class="col-n">N</th>
                                <th class="col-title">Title</th>
                                <th class="col-genres">Genres</th>
                                <th class="col-type">Type</th>
                                <th class="col-date">Created</th>
                                <th class="col-date">Last Edited</th>
                                <th class="col-rating">Rating</th>
                                <th class="col-action">View</th>
                                <th class="col-action">Edit</th>
                                <th class="col-action">Delete</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="text-center cell-muted">01</td>
                                <td class="cell-bold">Stranger Things</td>
                                <td>
                                    <span class="matrix-tag">Sci-Fi</span>
                                    <span class="matrix-tag">Drama</span>
                                </td>
                                <td class="text-center cell-muted">Series</td>
                                <td class="cell-muted">2026-05-12</td>
                                <td class="cell-muted">2026-06-02</td>
                                <td class="cell-bold"><i class="fa-solid fa-star star-accent"></i> 9.2</td>
                                <td class="text-center">
                                    <button class="row-btn view-btn" title="View details"><i
                                            class="fa-solid fa-eye"></i></button>
                                </td>
                                <td class="text-center">
                                    <button class="row-btn edit-btn" title="Edit entry"><i
                                            class="fa-solid fa-pen-to-square"></i></button>
                                </td>
                                <td class="text-center">
                                    <button class="row-btn delete-btn" title="Delete entry"><i
                                            class="fa-solid fa-trash"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>

            <footer class="app-footer">
                <div class="footer-left">
                    <div class="footer-brand">prism.</div>
                    <div>All rights reserved.</div>
                    <div>Built by pike65.</div>
                </div>
                <div class="footer-socials">
                    <a href="https://t.me/nimvelt" class="icon-link tg-icon" target="_blank" rel="noopener noreferrer">
                        <i class="fa-brands fa-telegram"></i>
                    </a>
                    <a href="https://github.com/pike65" class="icon-link gh-icon" target="_blank"
                        rel="noopener noreferrer">
                        <i class="fa-brands fa-github"></i>
                    </a>
                </div>
            </footer>
        </div>
        
    </div>

    <script src="https://kit.fontawesome.com/dea413ac19.js" crossorigin="anonymous"></script>
    <script>
        const themeBtn = document.getElementById('themeToggleBtn');
        const workspace = document.getElementById('dashboardWorkspace');

        if (themeBtn && workspace) {
            themeBtn.addEventListener('click', () => {
                if (workspace.classList.contains('theme-dark')) {
                    workspace.classList.remove('theme-dark');
                    workspace.classList.add('theme-light');
                } else {
                    workspace.classList.remove('theme-light');
                    workspace.classList.add('theme-dark');
                }
            });
        }
    </script>
</body>

</html>
