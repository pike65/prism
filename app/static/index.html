<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS VARIABLES FOR DESIGN SYSTEM --- */
        :root {
            --bg-primary: #ffffff;
            --text-primary: #0a0a0a;
            --text-secondary: #7c7c7c; 
            --border-glow-1: #f472b6; 
            --border-glow-2: #a3e635; 
            /* Set Space Grotesk as the global primary fallback font */
            --font-main: 'Space Grotesk', -apple-system, sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            --brand-telegram: #229ED9;
            --brand-github: #0a0a0a;
        }

        /* --- GLOBAL RESET & CORE LAYOUT --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1440px; 
            margin: 0 auto;
            padding: 0 40px;
        }

        /* --- HEADER BRAND BLOCK --- */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 32px 0; 
        }

        /* --- TRIANGLE ONLY LOGO --- */
        .brand-logo a {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon {
            font-size: 40px; 
            color: var(--text-primary);
            transition: var(--transition-smooth);
            display: inline-block;
            user-select: none;
            line-height: 1;
        }

        /* --- HOVER EFFECT FOR TRIANGLE --- */
        .brand-logo:hover .logo-icon {
            transform: rotate(180deg) scale(1.1);
            background: linear-gradient(135deg, var(--border-glow-1), #3b82f6, var(--border-glow-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- NAVIGATION ELEMENTS --- */
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 26px; 
        }

        .icon-link {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 30px; 
            transition: var(--transition-smooth);
        }

        .tg-icon:hover {
            color: var(--brand-telegram);
        }

        .gh-icon:hover {
            color: var(--brand-github);
        }

        /* --- SIGN UP CAPSULE BUTTON --- */
        .btn-signup {
            display: inline-block;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600; /* Balanced thickness for the new font engine */
            color: var(--text-primary);
            background-color: transparent;
            padding: 14px 28px;
            border: 4px solid var(--text-primary);
            border-radius: 50px; 
            position: relative;
            cursor: pointer;
            box-shadow: 0 0 0 0 transparent;
            transition: var(--transition-smooth);
        }

        .btn-signup:hover {
            color: var(--bg-primary);
            background-color: var(--text-primary);
            border-color: transparent;
            transform: scale(1.02);
            box-shadow: 
                -4px -2px 0px 1px var(--border-glow-1), 
                4px 3px 0px 1px var(--border-glow-2);
        }

        .btn-signup:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">

            <div class="brand-logo">
                <a href="#">
                    <span class="logo-icon">▲</span>
                </a>
            </div>

            <nav class="nav-actions">
                
                <a href="https://t.me/nimvelt" class="icon-link tg-icon" target="_blank" rel="noopener noreferrer" title="Telegram Channel">
                    <i class="fa-brands fa-telegram"></i>
                </a>

                <a href="https://github.com/pike65" class="icon-link gh-icon" target="_blank" rel="noopener noreferrer" title="GitHub Repository">
                    <i class="fa-brands fa-github"></i>
                </a>

                <a href="#" class="btn-signup">Sign-Up</a>

            </nav>

        </header>
    </div>
    
    <script src="https://kit.fontawesome.com/dea413ac19.js" crossorigin="anonymous"></script>
</body>
</html>
