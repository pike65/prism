<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Dashboard</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
        <defs>
            <linearGradient id='prism-grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'>
                <stop offset='0%25' style='stop-color:%23f472b6;stop-opacity:1' />
                <stop offset='50%25' style='stop-color:%233b82f6;stop-opacity:1' />
                <stop offset='100%25' style='stop-color:%23a3e635;stop-opacity:1' />
            </linearGradient>
        </defs>
        <polygon points='50 15, 15 80, 85 80' fill='url(%23prism-grad)' />
    </svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- VARS AND CONSTANTS --- */
        :root {
            --bg-primary: #ffffff;
            --text-primary: #0a0a0a;
            --text-secondary: #7c7c7c;
            --border-glow-1: #f472b6;
            --border-glow-2: #a3e635;
            --font-main: 'Space Grotesk', -apple-system, sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

            --brand-telegram: #229ED9;
            --brand-github: #0a0a0a;
        }

        /* --- GLOBAL RESET AND CORE LAYOUT --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            max-width: 1440px;
            width: 100%;
            margin: 0 auto;
            padding: 0 80px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* --------------- HEADER --------------- */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 0;
        }

        .brand-logo a {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo-icon {
            font-size: 40px;
            color: var(--text-primary);
            transition: var(--transition-smooth);
            display: inline-block;
            user-select: none;
            line-height: 1;
            position: relative;
            z-index: 2;
        }

        .brand-logo::before {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--border-glow-1), var(--border-glow-2));
            filter: blur(20px);
            opacity: 0.15;
            transition: var(--transition-smooth);
            z-index: 1;
        }

        .brand-logo:hover::before {
            opacity: 0.4;
            filter: blur(15px);
        }

        .brand-logo:hover .logo-icon {
            transform: rotate(180deg) scale(1.1);
            background: linear-gradient(135deg, var(--border-glow-1), #3b82f6, var(--border-glow-2));
            -webkit-text-fill-color: transparent;
        }

        /* --- NAVIGATION ELEMENTS --- */
        .nav-actions {
            display: flex;
            align-items: center;
        }

        .btn-signup {
            display: inline-block;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            background-color: transparent;
            padding: 14px 28px;
            border: 4px solid var(--text-primary);
            border-radius: 50px;
            position: relative;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-signup:hover {
            color: var(--bg-primary);
            background-color: var(--text-primary);
            border-color: transparent;
            transform: scale(1.02);
            box-shadow:
                -4px -2px 0px 1px var(--border-glow-1),
                4px 3px 0px 1px var(--border-glow-2);
        }

        .btn-signup:active {
            transform: scale(0.98);
        }

        /* ----- MAIN CONTENT SECTION ----- */
        .app-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding: 20px 0 60px 0;
        }

        /* --- INPUT CONTROL PANEL --- */
        .table-control {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            padding: 24px;
            background-color: #fafafa;
            border: 1px solid #eaeaea;
            border-radius: 16px;
        }

        .table-control input {
            flex: 1;
            min-width: 160px;
            height: 44px;
            padding: 0 16px;
            font-family: var(--font-main);
            font-size: 15px;
            font-weight: 500;
            background-color: #ffffff;
            border: 2px solid #eaeaea;
            border-radius: 8px;
            outline: none;
            transition: var(--transition-smooth);
        }

        .table-control input:focus {
            border-color: var(--text-primary);
        }

        .control-buttons {
            height: 44px;
            padding: 0 24px;
            font-family: var(--font-main);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition-smooth);
        }

        .save_btn {
            background-color: var(--text-primary);
            color: #ffffff;
            border: none;
        }

        .save_btn:hover {
            transform: scale(1.02);
            box-shadow: -2px -2px 0px 1px var(--border-glow-1), 2px 2px 0px 1px var(--border-glow-2);
        }

        .reset_btn {
            background-color: transparent;
            color: var(--text-secondary);
            border: 2px solid #eaeaea;
        }

        .reset_btn:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        /* --- MINIMALIST TRACKING TABLE --- */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-top: 10px;
        }

        th {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            padding: 16px;
            border-bottom: 2px solid var(--text-primary);
        }

        td {
            padding: 18px 16px;
            font-size: 16px;
            font-weight: 500;
            border-bottom: 1px solid #eaeaea;
        }

        tr:hover td {
            background-color: #fafafa;
        }

        /* ----- FOOTER ----- */
        .app-footer {
            border-top: 1px solid #eaeaea;
            padding: 40px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-top: auto;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .footer-brand {
            font-weight: 700;
            color: var(--text-primary);
        }

        .footer-socials {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .icon-link {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 24px;
            transition: var(--transition-smooth);
        }

        .tg-icon:hover {
            color: var(--brand-telegram);
        }

        .gh-icon:hover {
            color: var(--brand-github);
        }
    </style>
</head>

<body>

    <div class="app-container">
        <header class="app-header">
            <div class="brand-logo">
                <a href="#">
                    <span class="logo-icon">▲</span>
                </a>
            </div>
            <nav class="nav-actions">
                <a href="#" class="btn-signup">Sign-Up</a>
            </nav>
        </header>

        <main class="app-main">
            <section class="table-control">
                <input type="text" id="title" placeholder="Title">
                <input type="text" id="genre" placeholder="Genre">
                <input type="text" id="review" placeholder="Review">
                <input type="number" id="rating" placeholder="Rating" min="1" max="10" step="0.1">
                <button class="save_btn control-buttons" id="saveBtn">Save</button>
                <button class="reset_btn control-buttons" id="resetBtn">Reset</button>
            </section>

            <table>
                <thead>
                    <tr>
                        <th>N</th>
                        <th>Title</th>
                        <th>Genre</th>
                        <th>Review</th>
                        <th>Rating</th>
                    </tr>
                </thead>
                <tbody id="mediaTableBody">
                </tbody>
            </table>
        </main>

        <footer class="app-footer">
            <div class="footer-left">
                <div class="footer-brand">
                    prism.
                </div>
                <div>
                    All rights reserved.
                </div>
                <div>
                    Built by pike65.
                </div>
            </div>
            <div class="footer-socials">
                <a href="https://t.me/nimvelt" class="icon-link tg-icon" target="_blank" rel="noopener noreferrer"
                    title="Telegram Channel">
                    <i class="fa-brands fa-telegram"></i>
                </a>

                <a href="https://github.com/pike65" class="icon-link gh-icon" target="_blank" rel="noopener noreferrer"
                    title="GitHub Repository">
                    <i class="fa-brands fa-github"></i>
                </a>
            </div>
        </footer>
    </div>

    <script>
        const tableBody = document.getElementById('mediaTableBody');
        const saveButton = document.getElementById('saveBtn');
        const resetButton = document.getElementById('resetBtn');

        const titleInput = document.getElementById('title');
        const genreInput = document.getElementById('genre');
        const reviewInput = document.getElementById('review');
        const ratingInput = document.getElementById('rating');

        async function fetchAllMedia() {
            try {
                const response = await fetch('/media');
                if (!response.ok) throw new Error('Failed to fetch tracking data.');

                const mediaItems = await response.json();
                tableBody.innerHTML = '';

                mediaItems.forEach((item, index) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${index + 1}</td>
                        <td><strong>${item.title}</strong></td>
                        <td>${item.genre || '—'}</td>
                        <td>${item.review || '—'}</td>
                        <td>${item.rating}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Error rendering dashboard components:', error);
            }
        }

        async function createMediaEntry() {
            const payload = {
                title: titleInput.value.trim(),
                genre: genreInput.value.trim(),
                review: reviewInput.value.trim(),
                rating: parseFloat(ratingInput.value) || 0
            };

            if (!payload.title) {
                alert('Title parameter field is required to initialize a trace.');
                return;
            }

            try {
                const response = await fetch('/media', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.status === 201) {
                    clearInputs();
                    fetchAllMedia(); 
                } else {
                    console.error('Server rejected media row insertion values.');
                }
            } catch (error) {
                console.error('Network execution failure during submit operations:', error);
            }
        }

        function clearInputs() {
            titleInput.value = '';
            genreInput.value = '';
            reviewInput.value = '';
            ratingInput.value = '';
        }

        saveButton.addEventListener('click', createMediaEntry);
        resetButton.addEventListener('click', clearInputs);
        document.addEventListener('DOMContentLoaded', fetchAllMedia);
    </script>

    <script src="https://kit.fontawesome.com/dea413ac19.js" crossorigin="anonymous"></script>
</body>

</html>
